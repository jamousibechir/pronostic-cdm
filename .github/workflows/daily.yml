name: Pronostic CdM 2026 - daily

# Tourne chaque jour a 06:00 UTC = 08:00 Paris (heure d'ete CEST).
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: {}      # bouton "Run workflow" pour declencher a la main

permissions:
  contents: write            # pour committer le dashboard + le journal des pronostics

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dependances
        run: pip install -r requirements.txt

      - name: Recalculer les predictions + dashboard
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY || '483b2f1dd70c49b3b0b22335fb46937f' }}
        run: python predict.py --force --n-sims 10000

      - name: Publier le dashboard (index.html racine pour GitHub Pages par branche)
        run: |
          cp outputs/dashboard.html index.html
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html .nojekyll predictions_log.csv
          git diff --cached --quiet || git commit -m "chore: dashboard + journal pronostics (run quotidien) [skip ci]"
          git push
